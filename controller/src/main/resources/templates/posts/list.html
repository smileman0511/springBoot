<!doctype html>
<html lang="en" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>게시판 목록</title>
</head>
<body>
<!-- 게시판 리스트 화면에 출력하기 -->
    <h1 id="postTitle" th:text="*{postTitle}"></h1>
    <h1 id="postContent" th:text="*{postContent}"></h1>
    <h1 id="postReadCount" th:text="*{postReadCount}"></h1>
</body>
</html>
