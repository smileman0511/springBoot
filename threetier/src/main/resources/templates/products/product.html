<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>상품 정보</title>
</head>
<body>
    <h1>상품 정보</h1>

    <p>상품명 : <span th:text="${productVO.productName}"></span></p>
    <p>상품가격 : <span th:text="${productVO.productPrice}"></span></p>
    <p>상품재고 : <span th:text="${productVO.productStock}"></span></p>
    <p>상품브랜드 : <span th:text="${productVO.productBrand}"></span></p>
</body>
</html>
