<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>상품 등록</title>
    <style>
        input { display: block; margin-bottom: 10px; }
    </style>
</head>
<body>
<h1>상품 등록</h1>
<form th:action="@{/products/add}" method="post" th:object="${productVO}">
    <input type="text" th:field="*{productName}"  placeholder="상품명" />
    <input type="text" th:field="*{productPrice}" placeholder="상품가격" />
    <input type="text" th:field="*{productStock}" placeholder="상품재고" />
    <input type="text" th:field="*{productBrand}" placeholder="상품브랜드" />
    <button type="submit">상품 등록</button>
</form>
</body>
</html>
