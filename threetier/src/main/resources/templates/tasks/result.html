<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>총점과 평균 점수</title>
</head>
<body>
<h1>총점과 평균 점수</h1>
<p>이름 : <span th:text="${taskVO.studentName}"></span></p>
<p>국어 : <span th:text="${taskVO.scoreKor}"></span></p>
<p>수학 : <span th:text="${taskVO.scoreMath}"></span></p>
<p>영어 : <span th:text="${taskVO.scoreEng}"></span></p>
<p>총점 : <span th:text="${taskVO.scoreKor + taskVO.scoreMath + taskVO.scoreEng}"></span></p>
<p>평균 : <span th:text="${(taskVO.scoreKor + taskVO.scoreMath + taskVO.scoreEng) / 3}"></span></p>
</body>
</html>
