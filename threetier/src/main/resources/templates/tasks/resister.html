<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>이름과 점수 입력</title>
</head>
<body>
<h1>이름과 점수 입력</h1>
<form th:action="@{/tasks/result}" method="post" th:object="${taskVO}">
    <input type="text" th:field="*{studentName}" placeholder="이름" />
    <input type="text" th:field="*{scoreKor}"    placeholder="국어 점수" />
    <input type="text" th:field="*{scoreMath}"   placeholder="수학 점수" />
    <input type="text" th:field="*{scoreEng}"    placeholder="영어 점수" />
    <button type="submit">입력 완료</button>
</form>
</body>
</html>
