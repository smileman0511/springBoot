<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>학생 등록 페이지</title>
</head>
<body>
    <h1>점수 입력</h1>
    <form th:action="@{/students/register}" method="post" th:object="${studentVO}">
        <div>
            <span>이름</span>
            <input type="text" th:field="*{studentName}">
            <span>국어 점수</span>
            <input type="text" th:field="*{kor}">
            <span>수학 점수</span>
            <input type="text" th:field="*{math}">
            <span>영어 점수</span>
            <input type="text" th:field="*{eng}">
        </div>
        <button type="submit">입력하기</button>
    </form>

</body>
</html>
