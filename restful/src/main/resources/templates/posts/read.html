<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>게시글 상세보기</title>
</head>
<body>
    <th:block th:object="${post}">
        <p th:text="*{postTitle}"></p>
        <p th:text="*{postContent}"></p>
        <p th:text="*{memberName}"></p>
        <p th:text="'조회수: ' + *{postReadCount}"></p>
        <a th:href="@{/posts/update(id=*{id})}">수정하기</a>
        <a th:href="@{/posts/delete-ok(id=*{id})}">삭제하기</a>
    </th:block>
</body>
</html>
